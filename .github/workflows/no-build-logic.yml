name: Build and publish scan

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  DEVELOCITY_STORE_CONFIGURATION_CACHE: 'true'

jobs:
  seed-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout sources
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@prerelease/config-cache-support
      with:
        cache-write-only: true
        cache-encryption-key: 'AAAAAAAAAAAAAAAAAAAAAA=='
        develocity-url: 'https://ge.solutions-team.gradle.com'
        develocity-access-key: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
  
    - name: Run build
      run: ./gradlew build
      working-directory: no-build-logic

  restore-build:
    needs: seed-build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout sources
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@prerelease/config-cache-support
      with:
        cache-read-only: true
        cache-encryption-key: 'AAAAAAAAAAAAAAAAAAAAAA=='
        develocity-url: 'https://ge.solutions-team.gradle.com'
        develocity-access-key: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
  
    - name: Run build
      run: ./gradlew build
      working-directory: no-build-logic
