name: CC - older Develocity plugin (4.3.3)

# Scenario 5: downgrade the com.gradle.develocity plugin from 4.4.2 to 4.3.3 by
# patching settings.gradle.kts before building.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seed-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout sources
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Downgrade Develocity plugin to 4.3.3
      working-directory: no-build-logic
      run: sed -i 's/version "4.4.2"/version "4.3.3"/' settings.gradle.kts

    - name: Seed build (cache-write-only)
      uses: ./.github/actions/run-cc-scenario
      with:
        cache-write-only: true
        cache-encryption-key: 'AAAAAAAAAAAAAAAAAAAAAA=='
        develocity-url: 'https://ge.solutions-team.gradle.com'
        develocity-access-key: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
        restore-cc-enabled: true

  restore-build:
    needs: seed-build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout sources
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Downgrade Develocity plugin to 4.3.3
      working-directory: no-build-logic
      run: sed -i 's/version "4.4.2"/version "4.3.3"/' settings.gradle.kts

    - name: Verify build (cache-read-only)
      uses: ./.github/actions/run-cc-scenario
      with:
        cache-read-only: true
        cache-encryption-key: 'AAAAAAAAAAAAAAAAAAAAAA=='
        develocity-url: 'https://ge.solutions-team.gradle.com'
        develocity-access-key: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
        restore-cc-enabled: true
