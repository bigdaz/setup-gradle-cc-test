name: no-build-logic - gradle-8.5

# Scenario 7: provision Gradle 8.5 via the action and run `gradle build` instead
# of the project's 9.5.1 wrapper. The project targets Gradle 9.5.1, so warnings
# or failures under 8.5 are expected and themselves worth eyeballing.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seed-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout sources
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Seed build (cache-write-only)
      uses: ./.github/actions/run-cc-scenario
      with:
        cache-write-only: true
        cache-encryption-key: 'AAAAAAAAAAAAAAAAAAAAAA=='
        develocity-url: 'https://ge.solutions-team.gradle.com'
        develocity-access-key: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
        restore-cc-enabled: true
        gradle-version: '8.5'
        gradle-command: 'gradle build'

  restore-build:
    needs: seed-build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout sources
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Verify build (cache-read-only)
      uses: ./.github/actions/run-cc-scenario
      with:
        cache-read-only: true
        cache-encryption-key: 'AAAAAAAAAAAAAAAAAAAAAA=='
        develocity-url: 'https://ge.solutions-team.gradle.com'
        develocity-access-key: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
        restore-cc-enabled: true
        gradle-version: '8.5'
        gradle-command: 'gradle build'
