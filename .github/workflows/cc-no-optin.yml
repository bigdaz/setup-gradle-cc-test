name: CC - no config-cache opt-in

# Scenario 1: the DEVELOCITY_STORE_CONFIGURATION_CACHE opt-in is disabled
# (restore-cc-enabled: false). Everything else matches the happy path.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seed-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout sources
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Seed build (cache-write-only)
      uses: ./.github/actions/run-cc-scenario
      with:
        cache-write-only: true
        cache-encryption-key: 'AAAAAAAAAAAAAAAAAAAAAA=='
        develocity-url: 'https://ge.solutions-team.gradle.com'
        develocity-access-key: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
        restore-cc-enabled: false

  restore-build:
    needs: seed-build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout sources
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Verify build (cache-read-only)
      uses: ./.github/actions/run-cc-scenario
      with:
        cache-read-only: true
        cache-encryption-key: 'AAAAAAAAAAAAAAAAAAAAAA=='
        develocity-url: 'https://ge.solutions-team.gradle.com'
        develocity-access-key: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
        restore-cc-enabled: false
