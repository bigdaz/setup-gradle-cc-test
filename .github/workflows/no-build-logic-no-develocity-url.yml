name: no-build-logic - no-develocity-url

# Scenario 2: no Develocity server URL is provided to the action (develocity-url
# is empty), so no short-lived access token is minted. NOTE: the project's
# settings.gradle.kts still hardcodes the server; revisit after eyeballing if a
# truly server-less project is wanted (see plan notes).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seed-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout sources
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Seed build (cache-write-only)
      uses: ./.github/actions/run-cc-scenario
      with:
        cache-write-only: true
        cache-encryption-key: 'AAAAAAAAAAAAAAAAAAAAAA=='
        develocity-url: ''
        develocity-access-key: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
        restore-cc-enabled: true

  restore-build:
    needs: seed-build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout sources
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Verify build (cache-read-only)
      uses: ./.github/actions/run-cc-scenario
      with:
        cache-read-only: true
        cache-encryption-key: 'AAAAAAAAAAAAAAAAAAAAAA=='
        develocity-url: ''
        develocity-access-key: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
        restore-cc-enabled: true
