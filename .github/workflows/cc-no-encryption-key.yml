name: CC - no encryption key

# Scenario 6: no cache encryption key is provided to the action
# (cache-encryption-key is empty).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seed-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout sources
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Seed build (cache-write-only)
      uses: ./.github/actions/run-cc-scenario
      with:
        cache-write-only: true
        cache-encryption-key: ''
        develocity-url: 'https://ge.solutions-team.gradle.com'
        develocity-access-key: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
        restore-cc-enabled: true

  restore-build:
    needs: seed-build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout sources
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Verify build (cache-read-only)
      uses: ./.github/actions/run-cc-scenario
      with:
        cache-read-only: true
        cache-encryption-key: ''
        develocity-url: 'https://ge.solutions-team.gradle.com'
        develocity-access-key: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
        restore-cc-enabled: true
